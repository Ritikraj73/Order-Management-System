version: '3.8'

services:
  # PostgreSQL Databases
  postgres-auth:
    image: postgres:15-alpine
    container_name: oms-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
      - ./auth-service/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - oms-network

  postgres-product:
    image: postgres:15-alpine
    container_name: oms-postgres-product
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    networks:
      - oms-network

  postgres-order:
    image: postgres:15-alpine
    container_name: oms-postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - oms-network

  postgres-inventory:
    image: postgres:15-alpine
    container_name: oms-postgres-inventory
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    networks:
      - oms-network

  postgres-notification:
    image: postgres:15-alpine
    container_name: oms-postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - oms-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: oms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - oms-network

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: oms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - oms-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: oms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - oms-network

  # Backend Services
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: oms-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: oms-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres-auth
    networks:
      - oms-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: oms-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres-product
      - redis
    networks:
      - oms-network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: oms-inventory-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-inventory:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres-inventory
    networks:
      - oms-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: oms-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICES_PRODUCT_URL: http://product-service:8082
      SERVICES_INVENTORY_URL: http://inventory-service:8084
    depends_on:
      - postgres-order
      - kafka
      - product-service
      - inventory-service
    networks:
      - oms-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: oms-notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres-notification
      - kafka
    networks:
      - oms-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: oms-api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: oms-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - auth-service
      - product-service
      - order-service
      - inventory-service
      - notification-service
      - redis
    networks:
      - oms-network

volumes:
  postgres-auth-data:
  postgres-product-data:
  postgres-order-data:
  postgres-inventory-data:
  postgres-notification-data:
  redis-data:

networks:
  oms-network:
    driver: bridge